name = "my-little-shortener"
main = "src/worker.js"
compatibility_date = "2026-04-01"

# KV namespace — create with:
#   wrangler kv namespace create LINKS
# then paste the returned id below.
[[kv_namespaces]]
binding = "LINKS"
id = "79886634ba0d438fb29230b7d7235c1d"

# Custom domain routing — added after `wrangler deploy` via the
# Cloudflare dashboard (Workers & Pages → this worker → Settings →
# Domains & Routes → Add Custom Domain → yourdomain.com).

# ADMIN_PASSWORD is set as a secret, not here:
#   echo "yourpasswordhere" | wrangler secret put ADMIN_PASSWORD
